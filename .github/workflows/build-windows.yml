name: Build Windows App

# Produces the double-clickable WSR-Generator.exe so no Windows machine is
# needed to build it. Download from the run's Artifacts (or the Release on tags).
on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.3

      - name: Build executable
        run: pyinstaller --noconfirm WSR-Generator.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WSR-Generator-windows
          path: dist/WSR-Generator.exe
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WSR-Generator.exe
