name: Build macOS App

# Produces the double-clickable WSR-Generator.app (zipped) so no local build is
# needed. Download from the run's Artifacts (or the Release on tags).
on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.3"

      - name: Build app
        run: pyinstaller --noconfirm WSR-Generator.spec

      - name: Package .app (preserve bundle structure)
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "WSR-Generator.app" "WSR-Generator-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WSR-Generator-macos
          path: dist/WSR-Generator-macos.zip
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WSR-Generator-macos.zip
